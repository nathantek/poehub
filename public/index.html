<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoeHUB</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="page-header">
    <h1>PoeHUB</h1>
    <p>Centralise les outils autour de Path of Exile</p>
  </header>

  <main class="hub-main">
    <div class="hub-grid">
      <a class="hub-card hub-link" href="https://www.craftofexile.com/" target="_blank" rel="noopener noreferrer" title="Craft of Exile – calculateur et simulateur de craft">
        <img src="assets/craft-of-exile-card.png" alt="" class="hub-card-img" />
        <span class="hub-card-label">CRAFT</span>
      </a>
      <a class="hub-card hub-link" href="https://poe.ninja/" target="_blank" rel="noopener noreferrer" title="poe.ninja – économie et statistiques">
        <img src="assets/poe-ninja-card.png" alt="" class="hub-card-img" />
        <span class="hub-card-label">POE.NINJA</span>
      </a>
      <a class="hub-card hub-link" href="https://blight.raelys.com/" target="_blank" rel="noopener noreferrer" title="Blight Helper – anointments et huiles">
        <img src="assets/blight-helper-card.png" alt="" class="hub-card-img" />
        <span class="hub-card-label">BLIGHT HELPER</span>
      </a>
      <a class="hub-card hub-link" href="https://poe.re/#/maps" target="_blank" rel="noopener noreferrer" title="Path of Exile Regex – maps et recherche">
        <img src="assets/regex-card.png" alt="" class="hub-card-img" />
        <span class="hub-card-label">REGEX</span>
      </a>
      <a class="hub-card hub-link" href="https://www.pathofexile.com/" target="_blank" rel="noopener noreferrer" title="Path of Exile – site officiel">
        <img src="assets/poe-officiel-card.png" alt="" class="hub-card-img" />
        <span class="hub-card-label">POE OFFICIEL</span>
      </a>
      <a class="hub-card hub-link" href="https://www.poewiki.net/wiki/Path_of_Exile_Wiki" target="_blank" rel="noopener noreferrer" title="Path of Exile Wiki – wiki communautaire officiel">
        <img src="assets/wiki-card.png" alt="" class="hub-card-img" />
        <span class="hub-card-label">WIKI</span>
      </a>
      <a class="hub-card hub-link" href="https://vilsol.github.io/timeless-jewels/tree" target="_blank" rel="noopener noreferrer" title="Timeless Jewel Calculator – arbre et seeds">
        <span class="hub-card-label">TIMELESS</span>
      </a>
      <a class="hub-card hub-link" href="https://wealthyexile.com/profile/stash" target="_blank" rel="noopener noreferrer" title="Wealthy Exile – profil et stash">
        <img src="assets/wealthy-card.png" alt="" class="hub-card-img" />
        <span class="hub-card-label">WEALTHY</span>
      </a>
    </div>
  </main>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
