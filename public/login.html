<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoeHUB – Connexion</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 5vw, 32px);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top, rgba(240, 185, 11, 0.12), transparent 55%), var(--bg-card, #1b1f27);
      border-radius: var(--radius, 12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.75);
      padding: 22px 20px 20px;
    }

    .auth-title {
      margin: 0 0 4px;
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent, #f0b90b);
    }

    .auth-subtitle {
      margin: 0 0 16px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted, #9aa4bf);
    }

    .auth-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }

    .auth-tab {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--text-muted, #9aa4bf);
      background: transparent;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }

    .auth-tab--active {
      color: #111;
      background: linear-gradient(135deg, #ffc300, #f0b90b);
      border-color: rgba(0, 0, 0, 0.85);
      font-weight: 600;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .auth-field label {
      font-size: 0.8rem;
      color: var(--text-muted, #9aa4bf);
    }

    .auth-input {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(6, 9, 16, 0.95);
      padding: 8px 12px;
      color: var(--text, #e5e9f0);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.16s, box-shadow 0.16s, background 0.16s;
    }

    .auth-input:focus-visible {
      border-color: var(--accent, #f0b90b);
      box-shadow: 0 0 0 1px rgba(240, 185, 11, 0.7);
      background: #070b12;
    }

    .auth-actions {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .auth-submit {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      width: 100%;
      background: radial-gradient(circle at top left, #ffc300, #f0b90b);
      color: #111;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.8);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    .auth-submit:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.85);
    }

    .auth-submit:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.9);
    }

    .auth-footer {
      margin-top: 8px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted, #9aa4bf);
    }

    .auth-footer a {
      color: var(--accent, #f0b90b);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-error {
      display: none;
      margin-top: 4px;
      font-size: 0.78rem;
      color: #ff6b6b;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>PoeHUB</h1>
    <p>Connecte-toi pour personnaliser ton portail d’outils.</p>
  </header>

  <div class="auth-wrapper">
    <section class="auth-card" aria-labelledby="auth-title">
      <h2 id="auth-title" class="auth-title">PORTAIL</h2>
      <p class="auth-subtitle">Connexion / inscription à ton hub personnel</p>

      <div class="auth-tabs" role="tablist">
        <button id="tab-login" class="auth-tab auth-tab--active" type="button" aria-selected="true" role="tab">
          Connexion
        </button>
        <button id="tab-register" class="auth-tab" type="button" aria-selected="false" role="tab">
          Inscription
        </button>
      </div>

      <form id="auth-form" class="auth-form" novalidate>
        <input type="hidden" name="mode" id="auth-mode" value="login" />

        <div class="auth-field">
          <label for="email">Adresse e-mail</label>
          <input class="auth-input" type="email" id="email" name="email" autocomplete="email" required />
        </div>

        <div class="auth-field">
          <label for="password">Mot de passe</label>
          <input class="auth-input" type="password" id="password" name="password" autocomplete="current-password" required />
        </div>

        <p id="auth-error" class="auth-error">Une erreur est survenue. Réessaie plus tard.</p>

        <div class="auth-actions">
          <button type="submit" class="auth-submit">Valider</button>
        </div>

        <p class="auth-footer">
          Tu n’as pas encore de compte ? Utilise l’onglet <strong>Inscription</strong>.
        </p>
      </form>
    </section>
  </div>

  <script>
    (function () {
      const tabLogin = document.getElementById("tab-login");
      const tabRegister = document.getElementById("tab-register");
      const modeInput = document.getElementById("auth-mode");
      const form = document.getElementById("auth-form");
      const errorEl = document.getElementById("auth-error");

      function setMode(mode) {
        modeInput.value = mode;
        if (mode === "login") {
          tabLogin.classList.add("auth-tab--active");
          tabRegister.classList.remove("auth-tab--active");
        } else {
          tabRegister.classList.add("auth-tab--active");
          tabLogin.classList.remove("auth-tab--active");
        }
      }

      tabLogin.addEventListener("click", function () {
        setMode("login");
      });

      tabRegister.addEventListener("click", function () {
        setMode("register");
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errorEl.style.display = "none";

        const mode = modeInput.value;
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          errorEl.textContent = "Merci de renseigner e-mail et mot de passe.";
          errorEl.style.display = "block";
          return;
        }

        const endpoint = mode === "login" ? "/api/login" : "/api/register";

        fetch(endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, password }),
        })
          .then(async (response) => {
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
              errorEl.textContent = data.error || "Échec de l'authentification.";
              errorEl.style.display = "block";
              return;
            }
            // Succès : redirige vers la page principale du hub
            window.location.href = "/";
          })
          .catch((err) => {
            console.error("Auth error", err);
            errorEl.textContent = "Erreur réseau. Vérifie ta connexion.";
            errorEl.style.display = "block";
          });
      });
    })();
  </script>
</body>
</html>
